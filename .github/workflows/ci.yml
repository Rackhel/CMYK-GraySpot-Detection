name: CI Pipeline

on:
  push:
    branches: [ main, "Optimization(Rackhel)" ]
  pull_request:
    branches: [ main, "Optimization(Rackhel)" ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install linting dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8 black isort mypy

    - name: Run linting
      run: |
        flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Auto-format code with Black and Isort
      run: |
        python -m isort src --profile black
        python -m black src

    - name: Commit layout updates
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "style: automated code formatting updates via Black/Isort"

  test:
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.11"
          - os: windows-latest
            python-version: "3.11"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt

    - name: Run unit tests
      run: |
        python -m pytest src/tests/unit --cov=src --cov-report=xml

    - name: Run integration tests (not slow)
      run: |
        python -m pytest src/tests/integration -m "not slow"

    - name: Run smoke tests
      run: |
        python -m pytest src/tests/smoke -m smoke
      continue-on-error: true

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Upload test artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}-py${{ matrix.python-version }}
        path: |
          coverage.xml
          .pytest_cache/
        retention-days: 7

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip build wheel

    - name: Validate pyproject.toml
      run: |
        python -c "
        try:
            import tomllib
        except ImportError:
            import tomli as tomllib
        tomllib.loads(open('src/config/pyproject.toml', encoding='utf-8').read())
        print('pyproject.toml is valid')
        "

    - name: Check requirements.txt
      run: |
        python -c "import re; [line.split('#')[0].strip() for line in open('requirements.txt') if line.strip() and not line.strip().startswith('#')]" && echo "requirements.txt is valid"

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: |
        docker build -t grayspot:test .

    - name: Test Docker image
      run: |
        docker run --rm grayspot:test python -c "import torch; print('PyTorch version:', torch.__version__)"
