name: CI Pipeline

on:
  push:
    branches: [ 'main', 'Optimization(Rackhel)', 'master' ]
    paths:
      - 'src/**'
      - 'requirements.txt'
      - 'gui/**'
  pull_request:
    branches: [ 'main', 'Optimization(Rackhel)', 'master' ]
    paths:
      - 'src/**'
      - 'requirements.txt'
      - 'gui/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint_and_validate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install Quality and Security Tools
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8 black isort mypy bandit safety

    - name: Validate Configurations
      run: |
        python -c "
        import tomllib, sys
        try:
            with open('src/config/pyproject.toml', 'rb') as f:
                tomllib.load(f)
        except Exception as e:
            sys.exit(1)
        "

    - name: Enforce Code Formatting
      run: |
        python -m isort src --profile black --check-only
        python -m black src --check

    - name: Lint and Type Check
      run: |
        flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        mypy src --ignore-missing-imports

    - name: Security Scanning
      run: |
        bandit -r src/ -ll
        safety check -r requirements.txt

  test:
    needs: lint_and_validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt pytest pytest-cov pytest-html

    - name: Run test suites
      run: |
        python -m pytest src/tests/unit --cov=src --cov-report=xml --html=report.html --self-contained-html
        python -m pytest src/tests/integration -m "not slow"
        python -m pytest src/tests/smoke -m smoke || true

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        flags: unittests
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Upload test artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}
        path: |
          coverage.xml
          report.html
        retention-days: 7

  docker:
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        cache-from: type=gha
        cache-to: type=gha,mode=max