name: CI Pipeline

on:
  push:
    branches: [ 'main', 'Optimization(Rackhel)', 'master' ]
    paths:
      - 'src/**'
      - 'requirements.txt'
  pull_request:
    branches: [ 'main', 'Optimization(Rackhel)', 'master' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref || github.ref_name }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install Linting Tools
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8 black isort mypy

    - name: Auto-format Code
      run: |
        python -m isort src --profile black
        python -m black src

    - name: Verify Syntax Errors
      run: |
        flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Commit Formatting Fixes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "style: automated code formatting updates via Black/Isort"
        skip_dirty_check: false 

  test:
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.11"
          - os: windows-latest
            python-version: "3.11"
          - os: macos-latest
            python-version: "3.11"
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt pytest pytest-cov

    - name: Run test suites
      run: |
        python -m pytest src/tests/unit --cov=src --cov-report=xml
        python -m pytest src/tests/integration -m "not slow"
        python -m pytest src/tests/smoke -m smoke || true # Graceful failure replacing continue-on-error

    - name: Upload coverage reports
      uses: codecov/codecov-action@v6
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Upload test artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}-py${{ matrix.python-version }}
        path: |
          coverage.xml
          .pytest_cache/
        retention-days: 7

  build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Validate Configurations
      run: |
        python -c "
        import tomllib, sys
        try:
            with open('src/config/pyproject.toml', 'rb') as f:
                tomllib.load(f)
            print('pyproject.toml is valid')
        except Exception as e:
            print(f'Invalid toml: {e}')
            sys.exit(1)
        "

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        load: true
        tags: grayspot:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test Docker image
      run: |
        docker run --rm grayspot:test python -c "import torch; print('PyTorch version:', torch.__version__)"
