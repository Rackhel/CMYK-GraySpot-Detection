# ──────────────────────────────────────────────────────────────────────────
# Grayspot Detection System — Configuration / 설정 파일
# Project: CMYK Printer Defect Classification Pipeline
# ──────────────────────────────────────────────────────────────────────────

# ── 시스템 설정 / System Settings ──────────────────────────────────────────
system:
  project_name: "grayspot"              # 프로젝트명 / Project name
  version: "0.1.0"                      # 버전 / Version
  device: "auto"                        # "cuda" | "cpu" | "auto" (자동 감지)
  mixed_precision: false                # AMP 사용 여부 / Enable mixed precision training
  
# ── 데이터 설정 / Data Settings ───────────────────────────────────────────
data:
  channels: ["Y", "M", "C", "K"]        # CMYK 채널 / CMYK Channels
  num_levels: 6                         # 결함 수준: Level 0~5 / Defect levels: 0~5
  image_size: 128                       # 모델 입력 크기 / Model input size (pixels)
  
  # 데이터 분할 비율 / Data split ratios
  split_ratios:
    train: 0.7                          # 학습 데이터 / Training data
    val: 0.15                           # 검증 데이터 / Validation data
    test: 0.15                          # 실험 데이터 / Test data

# ── 경로 설정 / Path Settings (상대경로 / Relative to project root) ────────
storage:
  # 메인 디렉토리들 / Main directories
  data_root:        "data_set"          # 데이터 루트 / Data root directory
  labeled_dir:      "data_set/labeled"  # 라벨링된 이미지 / Labeled images
  raw_dir:          "data_set/raw"      # 원본 이미지 / Raw images
  models_dir:       "data_set/models"   # 모델 저장 / Model save directory
  reports_dir:      "data_set/reports"  # 리포트 / Reports directory
  outputs_dir:      "outputs"           # 출력 / Output directory
  logs_dir:         "outputs/logs"      # 로그 / Logs directory
  
  # 채널별 모델 저장 명명법 / Per-channel model naming convention
  model_checkpoint: "best_{channel}.pt"        # 채널별 최적 모델 / Best model
  model_last:       "last_{channel}.pt"        # 채널별 마지막 모델 / Last epoch
  history_file:     "history_{channel}.csv"   # 학습 이력 / Training history

# ── 모델 설정 / Model Settings ─────────────────────────────────────────────
model:
  backbone: "efficientnet_b0"           # "efficientnet_b0" | "resnet50"
  # feature_dim은 백본에 따라 자동 결정됨 / Auto-determined by backbone
  # efficientnet_b0: 1280 / resnet50: 2048
  
  weights: null                         # 사전 학습 가중치 경로 / Pretrained weights path
  frozen_backbone: false                # 백본 고정 여부 / Freeze backbone weights

# ── Phase 0 설정 (Self-Supervised Contrastive Learning) ─────────────────
phase0:
  enabled: true                         # Phase 0 실행 여부 / Enable Phase 0
  epochs: 10                            # 학습 에폭 / Training epochs
  batch_size: 16                        # 배치 크기 / Batch size
  learning_rate: 1.0e-3                 # 초기 학습률 / Initial learning rate
  warmup_epochs: 2                      # 워밍업 에폭 / Warmup epochs
  weight_decay: 1.0e-5                  # L2 정규화 / L2 regularization
  
  # 대조 학습 설정 / Contrastive learning settings
  temperature: 0.1                      # InfoNCE temperature
  projection_dim: 128                   # Projection Head 출력 차원 / Output dimension
  hidden_dim: 256                       # Hidden dimension
  
  # 데이터 증강 설정 / Augmentation settings
  augmentation:
    color_jitter: 0.4
    blur_prob: 0.5
    normalize: true

# ── Phase 2 설정 (Supervised Classification) ──────────────────────────────
phase2:
  epochs: 30                            # 학습 에폭 / Training epochs
  batch_size: 16                        # 배치 크기 / Batch size
  learning_rate: 1.0e-4                 # 초기 학습률 / Initial learning rate
  warmup_epochs: 1                      # 워밍업 에폭 / Warmup epochs
  weight_decay: 1.0e-4                  # L2 정규화 / L2 regularization
  
  # 모델 아키텍처 / Model architecture
  dropout: 0.3                          # Dropout 비율 / Dropout rate
  hidden_dim: 256                       # Classifier Head 은닉층 / Hidden dimension
  
  # 데이터 밸런싱 / Data balancing
  oversample: true                      # Oversampling 적용 여부 / Apply oversampling
  class_weights: "balanced"             # "balanced" | "none" | custom weights
  
  # 손실 함수 설정 / Loss function settings
  loss_type: "cross_entropy"            # "cross_entropy" | "focal_loss"
  focal_alpha: 0.25                     # Focal loss alpha (if applicable)
  focal_gamma: 2.0                      # Focal loss gamma (if applicable)
  
  # EarlyStopping 설정 / EarlyStopping settings
  early_stopping:
    enabled: true                       # EarlyStopping 활성화 / Enable
    patience: 5                         # 인내 에폭 / Patience epochs
    min_delta: 1.0e-4                   # 최소 개선량 / Minimum improvement

# ── 학습 공통 설정 / Common Training Settings ──────────────────────────────
train:
  seed: 42                              # 재현성 시드 / Reproducibility seed
  num_workers: 4                        # DataLoader workers
  pin_memory: true                      # CUDA pin memory
  prefetch_factor: 2                    # Prefetch factor for data loading
  persistent_workers: true              # Persistent workers
  
  # LR 스케줄러 / Learning rate scheduler
  scheduler: "cosine"                   # "cosine" | "step" | "exponential"
  eta_min: 1.0e-6                       # CosineAnnealingLR 최소 LR / Min LR
  gamma: 0.1                            # Step decay factor
  
  # Optimizer / 옵티마이저
  optimizer: "adamw"                    # "adamw" | "adam" | "sgd"
  momentum: 0.9                         # SGD momentum (if applicable)
  betas: [0.9, 0.999]                   # Adam/AdamW betas
  
  # Gradient 설정 / Gradient settings
  gradient_clip: 1.0                    # Gradient clipping value
  grad_accumulation_steps: 1            # Gradient accumulation steps

# ── 평가 목표 / Evaluation Targets ────────────────────────────────────────
evaluation:
  targets:
    overall_accuracy: 0.90              # 전체 정확도 목표 / Overall accuracy target
    per_color_accuracy: 0.85            # 채널별 정확도 목표 / Per-color accuracy target
    per_class_f1: 0.80                  # 클래스별 F1 목표 / Per-class F1 target
    mae: 0.50                           # MAE 목표 / Mean Absolute Error target
  
  # 평가 메트릭 설정 / Evaluation metrics
  metrics:
    - accuracy
    - precision
    - recall
    - f1
    - mae
    - confusion_matrix
    - per_class_metrics

# ── 로깅 설정 / Logging Settings ──────────────────────────────────────────
logging:
  level: "INFO"                         # "DEBUG" | "INFO" | "WARNING" | "ERROR"
  format: "detailed"                    # "simple" | "detailed" | "json"
  console_output: true                  # 콘솔 출력 / Console output
  file_output: true                     # 파일 출력 / File output
  
  # 로그 파일 이름 / Log file naming
  log_file: "training_{timestamp}.log"  # {timestamp} 자동 치환됨
  
  # 구간별 로그 / Interval logging
  log_interval: 50                      # 배치마다 로그 간격 / Log every N batches
  val_log_interval: 1                   # 에폭마다 검증 로그 간격 / Validation log interval

# ── 보고 파이프라인 설정 / Reporting Pipeline Settings ───────────────────
reporting:
  enabled: true                         # 보고서 생성 활성화 / Enable report generation
  format: "html"                        # "html" (currently only supported)
  
  # HTML 보고서 설정 / HTML report settings
  html:
    output_file: "baseline.html"        # 출력 파일명 / Output filename
    open_browser: false                 # 생성 후 브라우저 열기 / Open browser after generation
    include_interactive: true           # 대화형 Plotly 차트 포함 / Include interactive Plotly charts
    plotly_cdn: "https://cdn.plot.ly/plotly-2.35.2.min.js"  # Plotly CDN URL
  
  # 보고서 탭 설정 / Report tabs configuration
  tabs:
    - summary                           # Summary (KPIs + Model info)
    - perclass                          # Per-Class metrics
    - confusion                         # Confusion matrices
    - mae                               # MAE heatmap
    - confidence                        # Confidence distribution
    - feedback                          # Phase 3 feedback decision
  
  # 보고서 색상 및 스타일 / Report colors and styling
  colors:
    pass: "#2ecc71"                     # Pass/Success color
    fail: "#e74c3c"                     # Fail color
    warn: "#f39c12"                     # Warning color
    bg: "#0b1220"                       # Background color (dark)
    fg: "#e6eef8"                       # Foreground color (light)

# ── 추론 파이프라인 설정 / Inference Pipeline Settings ────────────────
inference:
  enabled: true                         # 추론 활성화 / Enable inference
  batch_size: 32                        # 기본 배치 크기 / Default batch size
  device: "auto"                        # "auto" | "cuda" | "cpu" (장치 선택)
  
  # 모델 로딩 / Model loading settings
  model_loading:
    cache_models: true                  # 메모리에 모델 캐싱 / Cache models in memory
    device_map: "auto"                  # "auto" | "cuda" | "cpu" (장치 매핑)
    dtype: "float32"                    # "float32" | "float16" (데이터 타입)
  
  # 추론 결과 / Inference output settings
  outputs:
    return_logits: true                 # 로짓 반환 / Return logits
    return_probabilities: true          # 확률 반환 / Return probabilities
    return_confidences: true            # 신뢰도 점수 반환 / Return confidence scores
  
  # 신뢰도 임계값 / Confidence thresholds
  confidence_thresholds:
    auto_accept: 0.8                    # 자동 수락 임계값 / Auto-accept threshold
    warn_threshold: 0.5                 # 경고 임계값 / Warning threshold
    manual_review: 0.3                  # 수동 검토 임계값 / Manual review threshold
  
  # 추론 최적화 / Inference optimizations
  optimizations:
    use_half_precision: false           # 반정도 정밀도 사용 / Use half precision
    use_quantization: false             # 양자화 사용 / Use quantization
    num_workers: 4                      # DataLoader workers
    pin_memory: true                    # CUDA pin memory

# ── Optuna Hyperparameter Tuning 설정 ───────────────────────────────────────
optuna:
  enabled: false                        # Optuna 튜닝 활성화 / Enable hyperparameter tuning
  direction: "maximize"                 # "maximize" | "minimize"
  n_trials: 20                          # 시행 횟수 / Number of trials
  n_jobs: 1                             # 병렬 작업 / Number of parallel jobs
  sampler: "tpe"                        # "tpe" | "random" | "grid"
  
  # 검색 범위 / Search space
  search_space:
    learning_rate: [1.0e-5, 1.0e-3]
    weight_decay: [1.0e-6, 1.0e-3]
    dropout: [0.1, 0.5]

# ── GPU/CUDA 설정 / GPU/CUDA Settings ──────────────────────────────────────
cuda:
  visible_devices: null                 # null = 모든 디바이스 / null = all devices
  deterministic: true                   # Deterministic mode
  benchmark: true                       # cuDNN benchmark mode

# ── 기타 설정 / Miscellaneous Settings ────────────────────────────────────
misc:
  save_config: true                     # 실행 시 config 저장 / Save config during run
  save_code_snapshot: true              # 코드 스냅샷 저장 / Save code snapshot
  verbose: true                         # 상세 출력 / Verbose output
  random_seed_all: true                 # 모든 모듈에 시드 설정 / Set seed for all modules
