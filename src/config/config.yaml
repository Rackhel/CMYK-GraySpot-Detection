# config.yaml — Grayspot Project SSOT
# Version: v0.1 (Stage 2 skeleton)
# Please update their section when code is added/changed, and add new sections as needed.

# ─── Paths ────────────────────────────────────────────
paths:
  data_raw: "data/raw/"
  data_labels: "data/labels/"
  checkpoints: "outputs/checkpoints/"
  reports: "outputs/reports/"
  logs: "logs/"
  optuna_db: "outputs/optuna/"
  drift_stats: "outputs/drift/"

# ─── Data / Preprocessing (R1 owns) ──────────────────
data:
  scan_resolution_dpi: 300          # PRD 6.4.1
  image_format: "png"
  color_mode: "RGB"
  cmyk_conversion_method: "TBD"     # R1 finalizes (PRD 6.5.1)
  
  roi:
    method: "auto"                  # "auto" | "fixed" (PRD 1.5 Principle 2)
    fallback: "fixed"
    fixed_coords:                   # placeholder — R1 measures actual coords
      yellow:  {x: 0, y: 0,   w: 0, h: 0}
      magenta: {x: 0, y: 0,   w: 0, h: 0}
      cyan:    {x: 0, y: 0,   w: 0, h: 0}
      black:   {x: 0, y: 0,   w: 0, h: 0}

  split:
    train: 0.70
    val: 0.15
    test: 0.15
    split_by: "session_id"          # PRD 6.3 — never change this

  augmentation:
    random_crop_scale: [0.6, 1.0]
    horizontal_flip: true
    brightness_jitter: 0.2
    contrast_jitter: 0.2
    gaussian_blur_kernel: [3, 7]
    gaussian_blur_sigma: [0.1, 2.0]

# ─── Model (R2 owns) ──────────────────────────────────
model:
  backbone: "efficientnet_b0"       # PRD 8.1.2 search space
  pretrained: true
  input_channels: 1                 # single-channel CMYK patch
  input_strategy: "replicate_3ch"   # PRD 6.8.4 default policy
  num_classes: 6                    # Level 0–5

  phase0:
    projection_dim: 128             # PRD 3.0 hyperparams
    projection_hidden: 256

  phase2:
    dropout: 0.3                    # tuned by Optuna later

# ─── Training (R2 owns) ───────────────────────────────
training:
  phase: 2                          # 0 or 2 — switched at runtime

  phase0:
    epochs: 100
    batch_size: 64
    learning_rate: 1.0e-3
    temperature: 0.1                # τ — PRD 3.0
    weight_decay: 1.0e-4
    pair_strategy: "augmentation"   # "augmentation" | "session_aware"

  phase2:
    epochs: 50
    batch_size: 32
    learning_rate: 1.0e-4
    weight_decay: 1.0e-4
    optimizer: "adamw"
    scheduler: "cosine_annealing"
    loss: "cross_entropy"           # "cross_entropy" | "ce_mae" | "coral"
    class_weights: "auto"

  device: "cuda"                    # "cuda" | "cpu"
  seed: 42
  num_workers: 4

# ─── Evaluation / Performance Targets (R3 owns) ───────
evaluation:
  targets:                          # PRD 1.4
    overall_accuracy: 0.90
    per_class_f1: 0.80
    per_color_accuracy: 0.85
    mae: 0.50
  
  swing_termination:
    max_cycles: 3
    min_improvement: 0.01           # PRD 3.3.3

# ─── Optuna HPO (R4 owns) ─────────────────────────────
optuna:
  n_trials: 30
  timeout: 3600
  sampler: "TPESampler"
  pruner: "MedianPruner"
  direction: "maximize"
  metric: "val_accuracy"
  storage: "sqlite:///outputs/optuna/study.db"

# ─── Inference (R6 owns) ──────────────────────────────
inference:
  confidence_thresholds:            # PRD 14.2
    auto_high: 0.80
    auto_low: 0.50
    manual_alert: 0.30
  export_formats: ["onnx"]         # "onnx" | "tflite" | "coreml"

# ─── Drift Monitoring (R6 owns) ───────────────────────
drift:
  entropy_multiplier: 1.5          # PRD 12.1
  embedding_distance_percentile: 95
  embedding_outlier_ratio: 0.15
  kl_divergence_threshold: 0.30
  check_frequency: "weekly"

# ─── Logging (R6 owns) ────────────────────────────────
logging:
  level: "INFO"                    # DEBUG | INFO | WARNING | ERROR
  file: "logs/grayspot.log"
  max_bytes: 10485760              # 10 MB
  backup_count: 5

