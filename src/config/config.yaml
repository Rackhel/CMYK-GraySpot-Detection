# ============================================================
# Grayspot — 전체 설정 파일 / Global Configuration
# ============================================================

# ── 로컬 스토리지 경로 / Local Storage Paths ──────────────────
storage:
  base_dir:       "data"
  raw_dir:        "data/images"         # download_dataset.py 다운로드 경로 / Download destination of download_dataset.py
  labeled_dir:    "data/labeled"        # 라벨링 완료 데이터 / Labeled dataset (CMYK × Level 0~5)
  training_dir:   "data/training"       # 학습 준비 데이터 / Training-ready data
  analyzed_dir:   "data/analyzed"       # 추론 결과 JSON / Inference result JSONs
  reports_dir:    "data/reports"        # 평가·실험 리포트 / Evaluation & experiment reports

# ── 데이터 정의 / Data Definition ─────────────────────────────
data:
  channels: ["Y", "M", "C", "K"]       # CMYK 채널 순서 (물리적 스트립 상→하) / Channel order (top→bottom strip)
  num_levels: 6                         # Level 0~5 (6단계 / 6 severity levels)
  image_size: 224                       # 모델 입력 크기 (H × W) / Model input size (H × W)
  input_channels: 3                     # 단일 채널 → 3채널 복제 (pretrained 호환) / Single channel replicated to 3ch for pretrained backbone
  scan_format: "png"                    # 스캔 이미지 포맷 / Scan image format
  scan_dpi: 300                         # 권장 DPI / Recommended scan DPI
  train_val_test_split: [0.70, 0.15, 0.15]  # 학습/검증/테스트 비율 / Train/val/test ratio (session-based split)

# ── 전처리 / Preprocessing ────────────────────────────────────
preprocessing:
  # RGB → CMYK 변환 / RGB to CMYK conversion
  cmyk_conversion: "formula"            # "formula": 수식 기반 | "icc": ICC 프로파일 기반 / "formula": math-based | "icc": ICC profile-based

  # ROI 분할 / ROI extraction
  roi_mode: "auto"                      # "auto": 자동 경계 검출 | "fixed": 고정 좌표 / "auto": boundary detection | "fixed": preset coordinates
  roi_fixed_coords:                     # roi_mode=fixed 시 사용 (x, y, w, h) / Used when roi_mode=fixed
    Y: [0,    0,   800, 200]
    M: [0,  200,   800, 200]
    C: [0,  400,   800, 200]
    K: [0,  600,   800, 200]
  roi_auto_min_confidence: 0.7          # 자동 검출 신뢰도 임계값 (미달 시 fixed fallback) / Min confidence for auto ROI (fallback to fixed if below)

  # 배경 보정 / Background Normalization
  bg_kernel_size: 51                    # 저주파 성분 추정 커널 크기 (홀수) / Kernel size for low-freq background estimation (must be odd)

  # 색상별 독립 정규화 파라미터 / Per-channel independent normalization parameters
  normalization:
    Y: {mean: 0.5, std: 0.25}
    M: {mean: 0.5, std: 0.25}
    C: {mean: 0.45, std: 0.28}          # Cyan: 더 민감한 설정 / Cyan: more sensitive setting
    K: {mean: 0.5, std: 0.25}

  # Feature Enhancement — Grayspot 강조 / Grayspot defect emphasis
  local_std_kernel: 9                   # 국소 표준편차 맵 커널 크기 / Local std-dev map kernel size
  bandpass_low: 3                       # 대역 통과 필터 저주파 커널 / Bandpass filter low-freq kernel
  bandpass_high: 15                     # 대역 통과 필터 고주파 커널 / Bandpass filter high-freq kernel
  directional_filter: true              # 방향성 필터 (Cyan 전용) / Directional streak filter (Cyan only)

# ── Phase 0: Contrastive Learning ─────────────────────────────
phase0:
  epochs: 100                           # 학습 에폭 수 / Number of training epochs
  batch_size: 64                        # 배치 크기 (클수록 Contrastive 학습에 유리) / Batch size (larger is better for contrastive)
  learning_rate: 1.0e-3                 # 초기 학습률 / Initial learning rate
  temperature: 0.1                      # InfoNCE τ — sharpness 제어 / InfoNCE τ — controls similarity sharpness
  projection_dim: 128                   # Projection Head 최종 출력 차원 / Projection head output dimension
  projection_hidden_dim: 256            # Projection Head 중간 차원 / Projection head hidden dimension

  # Contrastive Augmentation 정책 / Contrastive augmentation policy
  augmentation:
    random_crop_scale: [0.6, 1.0]       # 랜덤 크롭 스케일 범위 / Random crop scale range
    horizontal_flip: true               # 수평 뒤집기 / Horizontal flip
    brightness_jitter: 0.2              # 밝기 변동 강도 / Brightness jitter strength
    contrast_jitter: 0.2                # 대비 변동 강도 / Contrast jitter strength
    gaussian_blur_kernel: [3, 7]        # 가우시안 블러 커널 범위 / Gaussian blur kernel range
    gaussian_blur_sigma: [0.1, 2.0]     # 가우시안 블러 시그마 범위 / Gaussian blur sigma range

  # Positive Pair 전략 / Positive pair strategy
  pair_strategy: "both"                 # "augmentation": 증강 쌍 | "session_aware": 세션 기반 쌍 | "both": 병행 / "augmentation" | "session_aware" | "both"

  # 수렴 기준 / Convergence criterion
  convergence_patience: 15             # Embedding 군집 안정성 기준 에폭 / Epochs to wait for embedding cluster stability

# ── Phase 2: Supervised Classification ────────────────────────
phase2:
  epochs: 50                            # 전체 학습 에폭 (Stage1 + Stage2) / Total epochs (Stage1 + Stage2)
  batch_size: 32                        # 배치 크기 / Batch size
  learning_rate: 1.0e-4                 # 초기 학습률 / Initial learning rate
  weight_decay: 1.0e-4                  # L2 정규화 강도 / L2 regularization strength
  dropout_rate: 0.3                     # Classifier 드롭아웃 비율 / Classifier dropout rate
  fc_hidden_dim: 256                    # FC 레이어 히든 차원 / Fully connected hidden dimension
  backbone_freeze: true                 # Stage 1에서 Backbone 고정 여부 / Whether to freeze backbone in Stage 1

  # 2단계 학습 / Two-stage training (Stage 1 → Stage 2)
  stage1_epochs: 20                     # Backbone freeze — Classifier Head만 학습 / Backbone frozen, head only
  stage2_epochs: 30                     # Backbone 일부 unfreeze (fine-tune) / Partial backbone unfreeze for fine-tuning
  stage2_unfreeze_layers: 2             # unfreeze할 Backbone 마지막 레이어 수 / Number of last backbone layers to unfreeze

  # Loss 설정 / Loss configuration
  loss: "cross_entropy"                 # "cross_entropy" | "coral" | "ordinal_ce" | "ce_mae"
  class_weights: "balanced"             # "balanced": 클래스 불균형 자동 보정 | null: 미적용 / "balanced": auto class imbalance correction | null: disabled
  mae_regularizer_weight: 0.1          # loss=ce_mae 시 MAE 항 가중치 / MAE regularizer weight when loss=ce_mae

  # 학습률 스케줄러 / Learning rate scheduler
  scheduler: "cosine"                   # "cosine" | "step" | "plateau"
  scheduler_warmup_epochs: 5            # 워밍업 에폭 수 / Number of warmup epochs

  # Augmentation (Training 전용 / Training only)
  augmentation:
    brightness_jitter: 0.15             # 밝기 변동 강도 / Brightness jitter strength
    contrast_jitter: 0.15               # 대비 변동 강도 / Contrast jitter strength
    rotation_degrees: 5                 # 최대 회전 각도 / Max rotation degrees
    gaussian_noise_std: 0.02            # 가우시안 노이즈 표준편차 / Gaussian noise std

# ── 모델 / Model ───────────────────────────────────────────────
model:
  backbone: "efficientnet_b0"           # "efficientnet_b0" | "resnet50"
  pretrained: true                      # ImageNet 사전 학습 가중치 사용 여부 / Use ImageNet pretrained weights
  input_channel_mode: "replicate"       # "replicate": 단일채널 3배 복제 | "conv1_replace": 첫 레이어 교체 | "multichannel": 다채널 / Input channel adaptation strategy
  model_strategy: "shared"             # "shared": 4색상 공유 Backbone / 4-color shared backbone
                                        # "independent": 색상별 독립 모델 / Independent model per color
                                        # "hybrid": 공유 Backbone + 색상별 Head / Shared backbone + per-color head

# ── Optuna HPO ─────────────────────────────────────────────────
optuna:
  n_trials: 50                          # 탐색 시도 횟수 / Number of HPO trials
  timeout: 3600                         # 탐색 최대 시간 (초) / Max search time in seconds
  direction: "maximize"                 # "maximize": Accuracy 최대화 | "minimize": MAE 최소화 / Optimization direction
  metric: "val_accuracy"                # 최적화 기준 메트릭 / Target metric for optimization

  # Phase 0 탐색 공간 / Phase 0 search space
  phase0_search_space:
    temperature:      [0.05, 0.5]       # InfoNCE τ 범위 / InfoNCE temperature range
    projection_dim:   [64, 256]         # Projection 차원 후보 / Projection dimension candidates
    learning_rate:    [1.0e-4, 1.0e-2]  # 학습률 범위 / Learning rate range
    batch_size:       [32, 64, 128]     # 배치 크기 후보 / Batch size candidates

  # Phase 2 탐색 공간 / Phase 2 search space
  phase2_search_space:
    learning_rate:    [1.0e-5, 1.0e-2]  # 학습률 범위 / Learning rate range
    weight_decay:     [1.0e-5, 1.0e-2]  # L2 정규화 범위 / Weight decay range
    dropout_rate:     [0.0, 0.5]        # 드롭아웃 범위 / Dropout rate range
    fc_hidden_dim:    [128, 512]        # FC 히든 차원 범위 / FC hidden dim range
    backbone_freeze:  [true, false]     # Backbone 고정 여부 후보 / Backbone freeze candidates
    backbone_arch:    ["efficientnet_b0", "resnet50"]  # Backbone 아키텍처 후보 / Backbone architecture candidates

# ── 평가 / Evaluation ──────────────────────────────────────────
evaluation:
  # 성능 목표 (Phase 3 피드백 루프 기준) / Performance targets (Phase 3 feedback loop criteria)
  targets:
    overall_accuracy:   0.90            # 전체 색상 통합 정확도 목표 / Overall accuracy target across all colors
    per_class_f1:       0.80            # 레벨별 F1 목표 / Per-level F1 target
    per_color_accuracy: 0.85            # 색상별 정확도 목표 / Per-color accuracy target
    mae:                0.50            # 레벨 예측 평균 절대 오차 목표 / Mean absolute error target

  # Swing 복귀 기준 / Swing feedback loop thresholds
  swing_feedback:
    f1_phase1_threshold:    0.70        # 특정 Level F1 < 0.70 → Phase 1 복귀 / Level F1 below this → return to Phase 1
    mae_phase0_threshold:   0.80        # MAE > 0.80 → Phase 0 복귀 / MAE above this → return to Phase 0
    color_phase0_threshold: 0.80        # 특정 색상 Accuracy < 80% → Phase 0 복귀 / Color accuracy below this → return to Phase 0

  # Swing 종료 조건 / Swing termination conditions
  swing_max_cycles: 3                   # 최대 Swing 반복 횟수 / Maximum number of Swing cycles
  swing_convergence_delta: 0.01        # 연속 2회 개선 < 1% 시 수렴 판단 / Convergence if improvement < 1% for 2 consecutive cycles

# ── 추론 / Inference ───────────────────────────────────────────
inference:
  # Fallback 기준 (신뢰도 기반) / Confidence-based fallback thresholds
  confidence_auto:   0.80              # ≥ 0.80 → 자동 판정 확정 / Auto-confirmed prediction
  confidence_warn:   0.50              # 0.50~0.80 → 자동 판정 + 경고 / Auto prediction with warning
                                        # < 0.50 → 수동 검수 요청 / Manual review requested

  # 모델 저장 경로 / Model save paths
  model_dir: "data/models"             # 학습된 모델 저장 폴더 / Trained model directory
  best_model_name: "grayspot_best.pt"  # 최적 모델 파일명 / Best model filename
  onnx_model_name: "grayspot.onnx"     # ONNX 변환 모델 파일명 / ONNX export filename

# ── 리포트 / Reporting ─────────────────────────────────────────
reporting:
  csv_files:
    training_history:   "training_history.csv"    # 학습 이력 / Training history log
    evaluation_results: "evaluation_results.csv"  # 평가 결과 / Evaluation results
    metrics_summary:    "metrics_summary.csv"     # 메트릭 요약 / Metrics summary
    label_governance:   "label_governance.csv"    # 라벨 관리 이력 / Label governance history
  html_report_prefix:   "report_swing_cycle"      # HTML 리포트 파일명 접두사 / HTML report filename prefix

# ── 로깅 / Logging ─────────────────────────────────────────────
logging:
  level: "INFO"                         # DEBUG | INFO | WARNING | ERROR
  log_dir: "data/reports/logs"          # 로그 파일 저장 경로 / Log file directory