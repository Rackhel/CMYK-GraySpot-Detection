[pytest]
testpaths = src/tests/unit src/tests/integration src/tests/smoke
python_files = test_*.py
python_functions = test_*
python_classes = Test*
addopts = -v --tb=short
markers =
    slow: pretrained weight 다운로드가 필요한 테스트 (deselect with '-m "not slow"')
    smoke: 실제 데이터/학습이 필요한 전체 파이프라인 테스트 (select with '-m smoke')
